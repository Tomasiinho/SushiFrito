name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.5.1 --activate
      - name: Install gitleaks
        run: |
          GOBIN="$HOME/go/bin" go install github.com/zricethezav/gitleaks/v8@v8.30.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Block leaked secrets
        run: pnpm security:secrets
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
